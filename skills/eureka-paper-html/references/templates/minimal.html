<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563EB;
            --secondary: #3B82F6;
            --accent: #F97316;
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --text: #1E293B;
            --text-secondary: #64748B;
            --border: #E2E8F0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            color: var(--text);
            line-height: 1.6;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 48px 24px; }

        header { margin-bottom: 48px; padding-bottom: 32px; border-bottom: 1px solid var(--border); }

        .date { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }

        h1 { font-size: 36px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 16px; }

        .subtitle { font-size: 18px; color: var(--text-secondary); }

        .section { margin-bottom: 40px; }

        h2 { font-size: 24px; font-weight: 600; margin-bottom: 24px; }

        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .overview-card {
            background: var(--surface);
            padding: 20px 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .overview-card h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .paper-list { display: flex; flex-direction: column; gap: 24px; }

        .paper-card {
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 24px;
        }

        .paper-card:hover { border-color: var(--primary); }

        .paper-title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }

        .paper-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }

        .tag {
            background: #F1F5F9;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .abstract { font-size: 15px; color: var(--text-secondary); margin-bottom: 16px; }

        .paper-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 16px 0;
            border: 1px solid var(--border);
        }

        .pseudo-code {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 16px 20px;
            margin: 12px 0 20px 0;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #374151;
            white-space: pre-wrap;
            overflow-x: auto;
        }

        .pseudo-code-label {
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .links { display: flex; gap: 12px; }

        .link-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
        }

        .link-btn {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
        }

        .link-btn.primary { background: var(--primary); color: white; }
        .link-btn.primary:hover { background: #1d4ed8; }
        .link-btn.secondary { background: #F1F5F9; color: var(--text); }
        .link-btn.secondary:hover { background: #e2e8f0; }

        footer {
            margin-top: 64px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
        }

        @media (max-width: 640px) {
            h1 { font-size: 28px; }
            .container { padding: 24px 16px; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="date">{{date}}</div>
            <h1>{{title}}</h1>
            <p class="subtitle">{{subtitle}}</p>
        </header>

        <section class="section">
            <h2>Overview</h2>
            <div class="overview-grid">
                <div class="overview-card">
                    <h3>Overall Trend</h3>
                    <p>{{trend}}</p>
                </div>
                <div class="overview-card">
                    <h3>Research Hotspots</h3>
                    <p>{{hotspots}}</p>
                </div>
                <div class="overview-card">
                    <h3>Paper Count</h3>
                    <p>{{count}} papers</p>
                </div>
            </div>
        </section>

        <section class="section">
            <h2>Paper List</h2>
            <div class="paper-list">{{papers}}</div>
        </section>

        <footer><p>Generated by eureka-paper-html</p></footer>
    </div>
</body>
</html>
