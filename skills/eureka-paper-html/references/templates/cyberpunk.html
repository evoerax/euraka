<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --gradient-start: #6366f1;
            --gradient-end: #8b5cf6;
            --background: #0a0a0f;
            --surface: #12121a;
            --surface-elevated: #1a1a24;
            --text: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #2e2e3a;
            --glow: rgba(99, 102, 241, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 64px;
            position: relative;
        }

        header::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
            border-radius: 2px;
        }

        .date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--primary);
            letter-spacing: 0.1em;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--text) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Overview Cards */
        .overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 48px;
        }

        .overview-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .overview-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .overview-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px var(--glow);
        }

        .overview-card:hover::before {
            opacity: 1;
        }

        .overview-card h3 {
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }

        .overview-card p {
            font-size: 15px;
            color: var(--text);
        }

        /* Section */
        .section {
            margin-bottom: 48px;
        }

        h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h2::before {
            content: '';
            width: 4px;
            height: 28px;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 2px;
        }

        /* Paper Cards */
        .paper-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .paper-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            transition: all 0.3s ease;
            position: relative;
        }

        .paper-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(139, 92, 246, 0.1));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .paper-card:hover {
            transform: translateX(8px);
            border-color: var(--primary);
        }

        .paper-card:hover::before {
            opacity: 1;
        }

        .paper-number {
            position: absolute;
            top: -12px;
            left: 24px;
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
        }

        .paper-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
            padding-left: 40px;
        }

        .paper-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 16px;
            font-size: 14px;
            color: var(--text-secondary);
            padding-left: 40px;
        }

        .paper-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .paper-meta svg {
            width: 16px;
            height: 16px;
            opacity: 0.7;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            padding-left: 40px;
        }

        .tag {
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .abstract {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.8;
            padding-left: 40px;
        }

        .paper-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 16px 0 16px 40px;
            border: 1px solid var(--border);
        }

        .pseudo-code {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 20px;
            margin: 12px 0 20px 40px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text);
            white-space: pre-wrap;
            overflow-x: auto;
        }

        .pseudo-code-label {
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .links {
            display: flex;
            gap: 12px;
            padding-left: 40px;
        }

        .link-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .link-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .link-btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .link-btn.primary:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px var(--glow);
        }

        .link-btn.secondary {
            background: var(--surface-elevated);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .link-btn.secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Footer */
        footer {
            margin-top: 64px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
        }

        footer span {
            color: var(--primary);
        }

        /* Responsive */
        @media (max-width: 640px) {
            h1 { font-size: 32px; }
            h2 { font-size: 22px; }
            .container { padding: 40px 16px; }
            .paper-card { padding: 24px; }
            .paper-title, .paper-meta, .tags, .abstract, .links {
                padding-left: 0;
            }
            .paper-number { display: none; }
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .paper-card {
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        .paper-card:nth-child(1) { animation-delay: 0.1s; }
        .paper-card:nth-child(2) { animation-delay: 0.2s; }
        .paper-card:nth-child(3) { animation-delay: 0.3s; }
        .paper-card:nth-child(4) { animation-delay: 0.4s; }
        .paper-card:nth-child(5) { animation-delay: 0.5s; }

        @media (prefers-reduced-motion: reduce) {
            .paper-card { animation: none; opacity: 1; }
            * { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="date">{{date}}</div>
            <h1>{{title}}</h1>
            <p class="subtitle">{{subtitle}}</p>
        </header>

        <section class="section">
            <h2>Overview</h2>
            <div class="overview">
                <div class="overview-card">
                    <h3>Overall Trend</h3>
                    <p>{{trend}}</p>
                </div>
                <div class="overview-card">
                    <h3>Research Hotspots</h3>
                    <p>{{hotspots}}</p>
                </div>
                <div class="overview-card">
                    <h3>Paper Count</h3>
                    <p>{{count}} papers</p>
                </div>
            </div>
        </section>

        <section class="section">
            <h2>Paper List</h2>
            <div class="paper-list">
                {{papers}}
            </div>
        </section>

        <footer><p>Generated by <span>eureka-paper-html</span></p></footer>
    </div>
</body>
</html>
